name: CI

# Validates the whole stack on every push and PR. No deploys happen here —
# deployment is a separate, gated workflow (see deploy.yml). Safe to run freely.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  functions:
    name: Functions (lint, build, unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test

  rules-and-e2e:
    name: Firestore rules + E2E (emulators)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Java is required by the Firestore emulator.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install Firebase CLI
        run: npm i -g firebase-tools
      - name: Install function deps (loaded by the functions emulator)
        working-directory: functions
        run: npm ci
      - name: Install test deps
        working-directory: tests
        run: npm ci
      - name: Security-rules tests
        working-directory: tests
        run: npm test
      - name: End-to-end (auth + functions + firestore)
        working-directory: tests
        run: npm run test:e2e
