<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FBF8FB" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0F1116" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="The CycleVault Social — a calm, private community to ask questions and share experiences about your cycle."
    />
    <title>The CycleVault Social</title>
    <script type="text/javascript">
      // Companion to public/404.html — restores a deep-link path that the 404
      // fallback encoded into the query string, before React Router mounts.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500;1,9..144,600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="h-full">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
